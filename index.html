<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Bel-Engleezi Assessment</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body{
font-family:Montserrat,Cairo;
margin:0;
color:white;
background:#020617;
overflow-x:hidden;
}

.bg{
position:fixed;
width:100%;
height:100%;
z-index:-1;
background:linear-gradient(-45deg,#020617,#1e1b4b,#172554,#0f172a);
background-size:400% 400%;
animation:grad 15s ease infinite;
}

@keyframes grad{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.card{
background:rgba(15,23,42,.88);
backdrop-filter:blur(20px);
border-radius:26px;
border:1px solid rgba(255,255,255,.08);
}

.option{
background:#1e293b;
padding:16px;
border-radius:12px;
border:1px solid #334155;
cursor:pointer;
}

.option:hover{
border-color:#fbbf24;
}

.correct{
background:#065f46;
}

.wrong{
background:#7f1d1d;
}

.explain{
color:#fbbf24;
margin-top:10px;
font-size:14px;
}

.stage{
position:relative;
height:220px;
}

.mem{
width:120px;
height:150px;
position:absolute;
border-radius:12px;
border:2px solid #fbbf24;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
background:#1e293b;
}

.logoBack{
background:url(logo.jpg) center/cover;
}

</style>

</head>

<body>

<div class="bg"></div>

<div class="flex justify-center mt-16">

<div class="card p-10 max-w-xl w-full text-center" id="start">

<h1 class="text-3xl font-black mb-6">
Bel-Engleezi Elite Test
</h1>

<input id="name" placeholder="Full name" class="w-full p-3 rounded bg-slate-900 border border-slate-600 mb-4">

<button onclick="startTest()" class="bg-yellow-500 text-black px-8 py-3 rounded font-bold">
Start Test
</button>

</div>

</div>

<div id="quiz" class="hidden flex justify-center mt-10">

<div class="card p-8 max-w-3xl w-full">

<div id="counter" class="mb-4 text-yellow-400 font-bold"></div>

<div id="question"></div>

<div id="reading" class="mt-4"></div>

<div id="memory" class="stage mt-6"></div>

<div id="options" class="space-y-3 mt-6"></div>

<div id="explain" class="explain"></div>

<button id="next" onclick="nextQ()" class="hidden mt-6 bg-white text-black px-6 py-2 rounded">
Next
</button>

</div>

</div>

<script>

let state={
i:0,
score:0
}

let cheat=0

document.addEventListener("visibilitychange",function(){

if(document.hidden){
cheat++
if(cheat>2){
alert("Test closed due to cheating")
finish()
}
}

})

const questions=[

{
type:"grammar",
q:"Hardly ___ the meeting when the alarm rang",
options:["I started","had I started","did I start","I start"],
c:1,
ex:"After hardly we use inversion form had I started."
},

{
type:"grammar",
q:"Despite ___ a lot of experience he failed",
options:["have","having","to have","has"],
c:1,
ex:"After despite we use verb+ing."
},

{
type:"reading",
text:"Strong communication is the core of every successful company. Teams that exchange ideas clearly solve problems faster and reduce mistakes.",
q:"What improves problem solving in teams",
options:[
Clear communication,
More meetings,
Less feedback,
Working alone
],
c:0
},

{
type:"scenario",
q:"Client angry about delay. Best response",
options:[
Ignore message,
Apologize explain delay,
Blame supplier,
Tell client wait
],
c:1
},

{
type:"memory",
target:"Laptop",
cards:[
{word:"Laptop",img:"https://cdn-icons-png.flaticon.com/512/1041/1041916.png"},
{word:"Phone",img:"https://cdn-icons-png.flaticon.com/512/15/15874.png"},
{word:"Camera",img:"https://cdn-icons-png.flaticon.com/512/685/685655.png"},
{word:"Tablet",img:"https://cdn-icons-png.flaticon.com/512/888/888879.png"}
]
}

]

function startTest(){

document.getElementById("start").style.display="none"
document.getElementById("quiz").classList.remove("hidden")

render()

}

function render(){

let q=questions[state.i]

document.getElementById("counter").innerText=
(state.i+1)+" / "+questions.length

document.getElementById("options").innerHTML=""
document.getElementById("reading").innerHTML=""
document.getElementById("memory").innerHTML=""
document.getElementById("explain").innerHTML=""
document.getElementById("next").classList.add("hidden")

if(q.type=="reading"){

document.getElementById("reading").innerText=q.text

}

document.getElementById("question").innerHTML=
"<h2 class='text-xl font-bold'>"+q.q+"</h2>"

if(q.type=="memory"){

runMemory(q)

return

}

q.options.forEach((o,i)=>{

let div=document.createElement("div")
div.className="option"
div.innerText=o

div.onclick=()=>choose(i,q)

document.getElementById("options").appendChild(div)

})

}

function choose(i,q){

let opts=document.querySelectorAll(".option")

opts.forEach(x=>x.onclick=null)

if(i==q.c){

opts[i].classList.add("correct")
state.score++

}else{

opts[i].classList.add("wrong")
opts[q.c].classList.add("correct")

}

if(q.ex){

document.getElementById("explain").innerText=q.ex

}

document.getElementById("next").classList.remove("hidden")

}

function runMemory(q){

let stage=document.getElementById("memory")

let pos=[10,35,60,85]

q.cards.forEach((c,i)=>{

let d=document.createElement("div")

d.className="mem"

d.style.left="calc("+pos[i]+"% - 60px)"

d.innerHTML="<img src='"+c.img+"' width=60><br>"+c.word

d.dataset.word=c.word

stage.appendChild(d)

})

setTimeout(()=>{

document.querySelectorAll(".mem").forEach(c=>{

c.classList.add("logoBack")
c.innerHTML=""

})

shuffle(q)

},10000)

}

function shuffle(q){

let cards=[...document.querySelectorAll(".mem")]

let moves=0

let int=setInterval(()=>{

moves++

cards.forEach(c=>{

let x=Math.random()*80
c.style.left="calc("+x+"% - 60px)"

})

if(moves>5){

clearInterval(int)

cards.forEach(c=>{

c.onclick=()=>pick(c,q)

})

}

},600)

}

function pick(card,q){

let cards=document.querySelectorAll(".mem")

cards.forEach(c=>{

let word=c.dataset.word

let data=q.cards.find(x=>x.word==word)

c.innerHTML="<img src='"+data.img+"' width=60><br>"+word

})

if(card.dataset.word==q.target){

state.score++

card.classList.add("correct")

}else{

card.classList.add("wrong")

}

document.getElementById("next").classList.remove("hidden")

}

function nextQ(){

state.i++

if(state.i<questions.length){

render()

}else{

finish()

}

}

function finish(){

let name=document.getElementById("name").value

let text="Student "+name+" Score "+state.score

let url="https://wa.me/201144576661?text="+encodeURIComponent(text)

window.open(url)

document.body.innerHTML="<h1 style='text-align:center;margin-top:100px'>Test Completed</h1>"

}

</script>

</body>
</html>
