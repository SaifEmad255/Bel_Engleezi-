<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bel-Engleezi | Ultimate Assessment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p-gold: #fbbf24; --p-blue: #0f172a; }
        body { margin: 0; font-family: 'Montserrat', 'Cairo', sans-serif; color: #fff; overflow-x: hidden; min-height: 100vh; background-color: var(--p-blue); }
        
        .animated-bg {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #172554, #0f172a);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            position: fixed; width: 100%; height: 100%; z-index: -1;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .glass-card { 
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        select { appearance: none; background-color: rgba(15,23,42,0.9) !important; color: white !important; }
        select option { background-color: #0f172a; color: white; }

        .option-btn { transition: all 0.2s; }
        .option-btn:hover:not(:disabled) { transform: translateY(-2px); border-color: var(--p-gold); }
        .correct-ans { background: linear-gradient(145deg, #064e3b, #047857) !important; border-color: #34d399 !important; color: white !important; }
        .wrong-ans { background: linear-gradient(145deg, #7f1d1d, #991b1b) !important; border-color: #f87171 !important; color: white !important; }

        /* Magician Memory Game Styles */
        .magician-stage { position: relative; width: 100%; height: 200px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .magic-card { 
            position: absolute; width: 120px; height: 160px; 
            transition: left 0.5s ease-in-out, transform 0.3s; 
            transform-style: preserve-3d; cursor: pointer; top: 20px;
        }
        .magic-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .magic-card.flipped .magic-card-inner { transform: rotateY(180deg); }
        .card-face, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 12px; display: flex; align-items: center; justify-content: center; padding: 10px; border: 2px solid var(--p-gold); }
        .card-face { background: var(--p-gold); color: #000; font-weight: 900; font-size: 1.2rem; word-break: break-word; }
        .card-back { background: #1e293b; color: var(--p-gold); font-size: 2rem; transform: rotateY(180deg); flex-direction: column; }
        
        #writing-area { resize: none; }
    </style>
</head>
<body class="flex flex-col">
    <div class="animated-bg"></div>
    <audio id="bg-music" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-17.mp3" type="audio/mpeg"></audio>

    <header class="p-5 flex justify-between items-center z-10 border-b border-white/10 bg-slate-900/60 backdrop-blur-md">
        <div class="flex items-center gap-4">
            <div class="w-16 h-16 rounded-full border-2 border-yellow-500 overflow-hidden bg-slate-800">
                <img src="logo.jpg" alt="Logo" class="w-full h-full object-cover" onerror="this.src='https://ui-avatars.com/api/?name=BE&background=fbbf24&color=000';">
            </div>
            <div>
                <h1 class="text-xl font-black tracking-tighter uppercase text-white">Bel-Engleezi</h1>
                <p class="text-yellow-500 font-bold text-xs tracking-widest uppercase">Academy</p>
            </div>
        </div>
        <div id="timer-box" class="hidden font-mono text-xl text-yellow-500 bg-slate-950 px-4 py-1 rounded-full border border-yellow-500/50">30:00</div>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div id="start-screen" class="max-w-md w-full glass-card p-10 rounded-[2rem] text-center border-t-4 border-yellow-500">
            <h2 class="text-3xl font-black mb-2 text-white">Elite Assessment</h2>
            <p class="text-slate-400 mb-6 font-medium">Listening, Reading, Writing & Memory.</p>
            <div class="space-y-4 text-right" dir="rtl">
                <input type="text" id="u-name" placeholder="الاسم الكامل" class="w-full bg-slate-900 border border-slate-600 p-4 rounded-xl text-white outline-none focus:border-yellow-500 text-center">
                <select id="u-age" class="w-full bg-slate-900 border border-slate-600 p-4 rounded-xl text-white outline-none focus:border-yellow-500 text-center">
                    <option value="" disabled selected>المرحلة العمرية</option>
                    <option value="15">تحت الـ 20</option>
                    <option value="25">فوق الـ 20</option>
                </select>
                <select id="u-gender" class="w-full bg-slate-900 border border-slate-600 p-4 rounded-xl text-white outline-none focus:border-yellow-500 text-center">
                    <option value="" disabled selected>الجنس</option>
                    <option value="male">ذكر</option>
                    <option value="female">أنثى</option>
                </select>
            </div>
            <button onclick="startApp()" class="w-full mt-8 bg-yellow-500 hover:bg-yellow-400 text-black font-black py-4 rounded-xl text-xl transition-all">Start Assessment 🚀</button>
        </div>

        <div id="quiz-area" class="hidden max-w-4xl w-full" dir="ltr">
            <div class="flex items-center gap-4 mb-6 glass-card p-4 rounded-2xl">
                <div class="flex-grow h-2 bg-slate-800 rounded-full overflow-hidden">
                    <div id="progress-fill" class="h-full bg-yellow-500 w-0 transition-all duration-500"></div>
                </div>
                <span id="q-counter" class="font-black text-xl text-yellow-500">01/30</span>
            </div>

            <div class="glass-card p-8 sm:p-12 rounded-[2rem] relative min-h-[500px] flex flex-col justify-center">
                
                <div id="listening-panel" class="hidden text-center mb-6">
                    <button id="play-btn" onclick="playAudio()" class="bg-slate-800 text-yellow-400 border border-yellow-500/30 px-6 py-3 rounded-full font-bold flex items-center justify-center gap-2 mx-auto hover:bg-slate-700 transition-all">🔊 Listen to the passage</button>
                    <p class="text-slate-400 text-sm mt-2">Plays up to 2 times.</p>
                </div>

                <div id="reading-panel" class="hidden mb-6 bg-slate-900/80 p-6 rounded-xl border-l-4 border-yellow-500 text-slate-200 leading-relaxed text-lg italic shadow-inner"></div>

                <div id="writing-panel" class="hidden w-full mb-6">
                    <textarea id="writing-area" rows="4" placeholder="Type your professional response here..." class="w-full bg-slate-900 border border-slate-600 p-4 rounded-xl text-white outline-none focus:border-yellow-500 text-lg"></textarea>
                    <p id="writing-err" class="text-red-400 text-sm mt-2 hidden">Please write a complete sentence (at least 5 words).</p>
                    <button onclick="submitWriting()" class="mt-4 bg-yellow-500 text-black px-8 py-3 rounded-xl font-black text-lg hover:bg-yellow-400">Submit Answer</button>
                </div>

                <div id="magician-panel" class="hidden text-center">
                    <h3 class="text-3xl font-black text-yellow-500 mb-2">🎩 The Magician's Deck</h3>
                    <p id="magician-inst" class="text-white text-lg mb-6">Memorize the cards... <span id="mag-timer" class="font-black text-2xl text-yellow-500">5</span></p>
                    <div id="stage" class="magician-stage mb-8"></div>
                </div>

                <div id="q-text" class="text-2xl font-black mb-8 text-white leading-relaxed"></div>
                <div id="options-grid" class="grid grid-cols-1 gap-3"></div>
                
                <button id="next-btn" onclick="goToNext()" class="hidden w-full mt-8 bg-white text-slate-900 py-4 rounded-xl font-black text-xl hover:bg-slate-200 transition-all">Next Question ⮕</button>
            </div>
        </div>
    </main>

    <script>
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function playSnd(type) {
            try {
                if(!audioCtx) audioCtx = new AudioContext();
                const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                const n = audioCtx.currentTime;
                if(type==='click'){ o.type='sine'; o.frequency.setValueAtTime(800,n); o.frequency.exponentialRampToValueAtTime(300,n+0.1); g.gain.setValueAtTime(0.1,n); g.gain.linearRampToValueAtTime(0,n+0.1); o.start(n); o.stop(n+0.1); }
            } catch(e){}
        }

        let state = { current: 0, score: 0, timer: 1800, audioPlays: 0, memoryTarget: "", isLocked: false };

        // --- THE EXACT 30 QUESTIONS ---
        const TEST_DATA = [
            // 1 Fun Question
            { type: "fun", q: "To sound like a highly confident professional, which response to 'How are you' should you banish from your mind?", a: ["I'm doing exceptionally well.", "Couldn't be better!", "I am fine thank you and you.", "Very well, thanks for asking."], c: 2 },
            
            // 5 Listening (~20s texts)
            { type: "listening", text: "Good morning everyone. Before we dive into the agenda, I want to address the recent fluctuations in our quarterly revenue. Due to unforeseen supply chain disruptions and the increased cost of raw materials globally, our profit margins have temporarily decreased by twelve percent. However, the new automated system we are deploying next month is projected to cut operational costs significantly, putting us back on track by Q3.", q: "What is the primary reason for the decreased profit margins mentioned in the audio?", a: ["Poor employee performance.", "Supply chain disruptions and material costs.", "A broken automated system.", "Decreased customer demand."], c: 1 },
            { type: "listening", text: "When negotiating a high-stakes contract, it's crucial to never show desperation. Elite negotiators use strategic pauses to their advantage. If the client demands a ridiculous discount, instead of immediately saying 'no', you should pause for three seconds, maintain strong eye contact, and politely state that while you value the partnership, your pricing reflects the premium quality and dedicated support your agency provides.", q: "According to the speaker, what should you do when a client asks for a ridiculous discount?", a: ["Say no immediately to show dominance.", "Agree temporarily to save the deal.", "Pause, maintain eye contact, and defend your value.", "Offer a smaller discount right away."], c: 2 },
            { type: "listening", text: "I am calling regarding the discrepancies in the latest financial report you submitted on Tuesday. It appears that the figures in section four do not align with the projected budget we agreed upon during last week's board meeting. I need you to cross-reference these numbers with the marketing department's expenditures and send me a revised copy by Friday morning at the absolute latest.", q: "When does the revised financial report need to be submitted?", a: ["Tuesday afternoon.", "By Friday morning.", "Next week.", "Immediately."], c: 1 },
            { type: "listening", text: "Transitioning to a fully remote work model has its challenges, primarily in maintaining corporate culture and team synergy. We have noticed a drop in spontaneous collaboration. To counter this, management is introducing mandatory virtual 'water-cooler' sessions every Wednesday. These are not meant for project updates, but strictly for informal team bonding to replicate the office environment.", q: "What is the purpose of the virtual 'water-cooler' sessions?", a: ["To give project updates.", "To fire underperforming employees.", "To enforce strict rules.", "To encourage informal team bonding."], c: 3 },
            { type: "listening", text: "In today's fast-paced market, relying solely on traditional advertising is a path to irrelevance. Our new strategy will pivot entirely towards organic community building and influencer partnerships. We are allocating sixty percent of our Q2 budget to user-generated content campaigns. The goal is to make our customers our primary brand ambassadors, rather than just passive consumers of our ads.", q: "Where is the company allocating 60% of its Q2 budget?", a: ["Traditional TV advertising.", "User-generated content campaigns.", "Hiring new salespeople.", "Building a new office."], c: 1 },

            // 5 Reading Passages
            { type: "reading", passage: "Effective leadership is rarely about giving orders; it is predominantly about active listening and emotional intelligence. A manager dictates tasks, whereas a leader cultivates an environment where team members feel empowered to take calculated risks. By fostering a culture of psychological safety, companies see a dramatic decrease in employee turnover and a significant spike in innovative problem-solving.", q: "Based on the text, what is a key difference between a manager and a leader?", a: ["A leader dictates more tasks.", "A leader prevents employees from taking risks.", "A manager focuses on psychological safety.", "A manager dictates, while a leader empowers."], c: 3 },
            { type: "reading", passage: "The concept of 'quiet quitting' has permeated modern corporate environments. It does not mean an employee actually resigns; rather, it refers to the practice of strictly performing only the duties outlined in one's job description, refusing to go above and beyond without additional compensation. This phenomenon is largely viewed as a direct response to toxic hustle culture and burnout.", q: "What does 'quiet quitting' actually mean?", a: ["Leaving the office without telling anyone.", "Doing only the required job duties and nothing extra.", "Resigning via a quiet whisper.", "Working extra hours in silence."], c: 1 },
            { type: "reading", passage: "Diversifying an investment portfolio is the most fundamental strategy to mitigate financial risk. If an investor allocates all their capital into a single volatile tech stock, they expose themselves to catastrophic losses. Conversely, spreading investments across real estate, bonds, and various equity sectors ensures that a downturn in one market is often balanced by stability or growth in another.", q: "Why should an investor diversify their portfolio?", a: ["To guarantee maximum profits quickly.", "To mitigate risk and balance potential losses.", "Because investing in tech is illegal.", "To pay less taxes to the government."], c: 1 },
            { type: "reading", passage: "In crisis management, the speed of the corporate response is just as critical as its accuracy. When a PR disaster strikes, maintaining absolute silence out of fear of legal repercussions often backfires, allowing public speculation to destroy the brand's reputation. A prompt, transparent acknowledgment of the issue, even before all facts are known, demonstrates accountability and helps control the narrative.", q: "According to the passage, why is absolute silence a bad strategy during a PR crisis?", a: ["It allows public speculation to ruin the brand's reputation.", "It costs too much money.", "It makes the lawyers angry.", "It proves the company is innocent."], c: 0 },
            { type: "reading", passage: "Micro-managing is a destructive habit that stifles employee growth. When a supervisor obsesses over every minor detail of a subordinate's work, it sends a clear psychological message: 'I do not trust your competence.' This inevitably leads to a demoralized workforce that waits for instructions rather than taking proactive initiative.", q: "What psychological message does micro-managing send to an employee?", a: ["I care about your success.", "I do not trust your competence.", "You are ready for a promotion.", "I want to be your friend."], c: 1 },

            // 10 Grammar & Vocab (B1-C1)
            { type: "grammar", q: "Choose the correct inversion: 'Hardly _____ the meeting when the fire alarm rang.'", a: ["I had started", "did I start", "had I started", "I started"], c: 2 },
            { type: "grammar", q: "If the CEO hadn't stepped down, the company _____ bankrupt by now.", a: ["will go", "would have gone", "went", "would go"], c: 1 },
            { type: "grammar", q: "It is imperative that the new regulations _____ implemented immediately.", a: ["are", "be", "were", "will be"], c: 1 },
            { type: "grammar", q: "By this time next year, I _____ my advanced English certification.", a: ["will finish", "will be finishing", "will have finished", "am finishing"], c: 2 },
            { type: "grammar", q: "Which word is a synonym for 'Meticulous'?", a: ["Careless", "Thorough and precise", "Angry", "Fast"], c: 1 },
            { type: "grammar", q: "I would rather you _____ that confidential email to the client.", a: ["didn't send", "not send", "haven't sent", "don't send"], c: 0 },
            { type: "grammar", q: "Despite _____ a lot of experience, he failed the technical interview.", a: ["to have", "he has", "having", "have"], c: 2 },
            { type: "grammar", q: "The term 'Red tape' in business refers to:", a: ["Office supplies", "Excessive bureaucracy and rules", "A dangerous situation", "A celebration ribbon"], c: 1 },
            { type: "grammar", q: "We need to _____ the facts before making a final decision.", a: ["look into", "look down", "look after", "look out"], c: 0 },
            { type: "grammar", q: "Not only _____ the deadline, but he also exceeded the project budget.", a: ["he missed", "did he miss", "missed he", "he did miss"], c: 1 },

            // 3 Writing
            { type: "writing", q: "Writing Task 1: Write a professional 2-sentence response declining an invitation to a meeting because you have a schedule conflict." },
            { type: "writing", q: "Writing Task 2: Write a short sentence explaining to your manager that the project will be delayed by two days due to technical issues." },
            { type: "writing", q: "Writing Task 3: In one strong sentence, introduce yourself and state your current professional role." },

            // 5 Memory Games (The Magician)
            { type: "memory", words: ["Revenue", "Deficit", "Margin", "Asset"], target: "Margin" },
            { type: "memory", words: ["Fluency", "Accent", "Dialect", "Grammar"], target: "Dialect" },
            { type: "memory", words: ["Synergy", "Merger", "Acquisition", "Shares"], target: "Merger" },
            { type: "memory", words: ["Delegate", "Execute", "Supervise", "Launch"], target: "Execute" },
            { type: "memory", words: ["Resilient", "Fragile", "Robust", "Agile"], target: "Agile" },

            // 1 Fun Question (End)
            { type: "fun", q: "You finished the toughest assessment! What is the ultimate secret to speaking English confidently?", a: ["Memorizing the dictionary.", "Apologizing for every grammar mistake.", "Speaking boldly and embracing the mistakes as part of the process! 🦅", "Only speaking when 100% sure."], c: 2 }
        ];

        function startApp() {
            if(!document.getElementById('u-name').value || !document.getElementById('u-age').value || !document.getElementById('u-gender').value) return alert("الرجاء إكمال البيانات");
            playSnd('click');
            document.getElementById('bg-music').volume = 0.15;
            document.getElementById('bg-music').play().catch(()=>{});
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-area').classList.remove('hidden');
            document.getElementById('timer-box').classList.remove('hidden');
            
            setInterval(() => {
                state.timer--; let m=Math.floor(state.timer/60), s=state.timer%60;
                document.getElementById('timer-box').innerText = `${m}:${s.toString().padStart(2,'0')}`;
            }, 1000);
            renderQuestion();
        }

        function renderQuestion() {
            state.isLocked = false;
            const q = TEST_DATA[state.current];
            document.getElementById('q-counter').innerText = `${(state.current + 1).toString().padStart(2,'0')}/30`;
            document.getElementById('progress-fill').style.width = `${((state.current+1)/30)*100}%`;
            
            // Reset UI
            ['listening-panel', 'reading-panel', 'writing-panel', 'magician-panel', 'options-grid', 'next-btn'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById('q-text').innerText = "";

            if(q.type === 'writing') {
                document.getElementById('q-text').innerText = q.q;
                document.getElementById('writing-area').value = "";
                document.getElementById('writing-err').classList.add('hidden');
                document.getElementById('writing-panel').classList.remove('hidden');
            } else if (q.type === 'memory') {
                runMagicianGame(q);
            } else {
                document.getElementById('options-grid').classList.remove('hidden');
                document.getElementById('options-grid').innerHTML = "";
                document.getElementById('q-text').innerText = q.q;

                if(q.type === 'listening') {
                    state.audioPlays = 2;
                    document.getElementById('play-btn').innerText = `🔊 Listen to the passage (${state.audioPlays} left)`;
                    document.getElementById('play-btn').disabled = false;
                    document.getElementById('listening-panel').classList.remove('hidden');
                } else if(q.type === 'reading') {
                    document.getElementById('reading-panel').innerText = `"${q.passage}"`;
                    document.getElementById('reading-panel').classList.remove('hidden');
                }

                q.a.forEach((opt, idx) => {
                    let btn = document.createElement('button');
                    btn.className = "option-btn w-full p-4 rounded-xl bg-slate-800 border border-slate-600 font-bold text-left text-white text-lg";
                    btn.innerText = opt;
                    btn.onclick = () => handleChoice(btn, idx, q.c);
                    document.getElementById('options-grid').appendChild(btn);
                });
            }
        }

        function playAudio() {
            if(state.audioPlays > 0) {
                let u = new SpeechSynthesisUtterance(TEST_DATA[state.current].text);
                u.lang = 'en-US'; u.rate = 0.9;
                window.speechSynthesis.speak(u);
                state.audioPlays--;
                document.getElementById('play-btn').innerText = `🔊 Listen to the passage (${state.audioPlays} left)`;
                if(state.audioPlays === 0) document.getElementById('play-btn').disabled = true;
            }
        }

        function submitWriting() {
            let val = document.getElementById('writing-area').value.trim();
            if(val.split(" ").length < 5) {
                document.getElementById('writing-err').classList.remove('hidden');
                playSnd('click');
            } else {
                document.getElementById('writing-err').classList.add('hidden');
                state.score++; // Consider writing accepted
                document.getElementById('writing-panel').innerHTML = "<div class='p-4 bg-emerald-900/50 border border-emerald-500 text-emerald-400 rounded-xl font-bold text-center'>Answer Recorded Professionally!</div>";
                document.getElementById('next-btn').classList.remove('hidden');
            }
        }

        // --- THE MAGICIAN LOGIC ---
        function runMagicianGame(q) {
            document.getElementById('magician-panel').classList.remove('hidden');
            const stage = document.getElementById('stage');
            stage.innerHTML = "";
            state.memoryTarget = q.target;
            
            let posData = [10, 35, 60, 85]; // Percentages across the container
            
            // Create Cards Face Up
            q.words.forEach((w, i) => {
                let card = document.createElement('div');
                card.className = "magic-card";
                card.style.left = `calc(${posData[i]}% - 60px)`;
                card.dataset.word = w;
                
                card.innerHTML = `
                    <div class="magic-card-inner">
                        <div class="card-face">${w}</div>
                        <div class="card-back">🦅</div>
                    </div>
                `;
                stage.appendChild(card);
            });

            let t = 5;
            document.getElementById('mag-timer').innerText = t;
            let tmr = setInterval(() => {
                t--; document.getElementById('mag-timer').innerText = t;
                if(t <= 0) {
                    clearInterval(tmr);
                    document.getElementById('magician-inst').innerText = "Shuffling... Keep your eyes sharp!";
                    
                    // Flip cards face down
                    document.querySelectorAll('.magic-card').forEach(c => c.classList.add('flipped'));
                    
                    // Start Shuffle
                    setTimeout(() => doMagicShuffle(posData, q), 800);
                }
            }, 1000);
        }

        function doMagicShuffle(posData, q) {
            let cards = Array.from(document.querySelectorAll('.magic-card'));
            let shuffles = 0;
            
            let shfInterval = setInterval(() => {
                shuffles++;
                playSnd('click');
                // Randomize positions array
                let currentPos = [...posData].sort(() => Math.random() - 0.5);
                cards.forEach((c, i) => {
                    c.style.left = `calc(${currentPos[i]}% - 60px)`;
                });

                if(shuffles >= 6) { // Shuffle 6 times
                    clearInterval(shfInterval);
                    setTimeout(() => {
                        document.getElementById('magician-inst').innerHTML = `Where is the word <span class="text-yellow-500 font-black text-2xl">'${q.target}'</span>? Click the card.`;
                        cards.forEach(c => c.onclick = () => handleMagicPick(c));
                    }, 500);
                }
            }, 600); // Speed of shuffle
        }

        function handleMagicPick(card) {
            if(state.isLocked) return;
            state.isLocked = true;
            
            document.querySelectorAll('.magic-card').forEach(c => {
                c.classList.remove('flipped'); // Reveal all
                c.onclick = null;
                if(c.dataset.word === state.memoryTarget) c.querySelector('.card-face').style.background = "#34d399"; // correct green
            });

            if(card.dataset.word === state.memoryTarget) {
                playSnd('click'); // Should be 'correct' but simplesnd handles it
                state.score++;
                document.getElementById('magician-inst').innerHTML = "<span class='text-emerald-400 font-bold'>Excellent Memory!</span>";
            } else {
                card.querySelector('.card-face').style.background = "#f87171"; // wrong red
                document.getElementById('magician-inst').innerHTML = "<span class='text-red-400 font-bold'>Lost track!</span>";
            }
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function handleChoice(btn, idx, correct) {
            if(state.isLocked) return;
            state.isLocked = true;
            let btns = document.querySelectorAll('.option-btn');
            btns.forEach(b => b.disabled = true);
            if(idx === correct) {
                btn.classList.add('correct-ans'); state.score++;
            } else {
                btn.classList.add('wrong-ans'); btns[correct].classList.add('correct-ans');
            }
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function goToNext() {
            playSnd('click');
            window.speechSynthesis.cancel(); // Stop audio if still playing
            state.current++;
            if(state.current < 30) renderQuestion();
            else finishTest();
        }

        function finishTest() {
            document.getElementById('quiz-area').innerHTML = `
                <div class="text-center p-10">
                    <h2 class="text-5xl font-black text-yellow-500 mb-6 uppercase tracking-widest">Assessment Complete</h2>
                    <p class="text-3xl text-white font-bold mb-4">Your Elite Score: ${state.score} / 30</p>
                    <p class="text-slate-400 text-lg leading-relaxed mb-8">This is just the baseline. The true goal is unwavering confidence in speaking and writing. You are now ready for the real training.</p>
                </div>
            `;
        }
    </script>
</body>
</html>
