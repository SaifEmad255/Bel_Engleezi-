<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Bel-Engleezi Assessment</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Montserrat,Cairo;
color:white;
background:#020617;
overflow-x:hidden;
}

.bg{
position:fixed;
width:100%;
height:100%;
z-index:-1;
background:linear-gradient(-45deg,#020617,#0f172a,#1e1b4b,#172554);
background-size:400% 400%;
animation:grad 14s ease infinite;
}

@keyframes grad{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.glass{
background:rgba(15,23,42,.85);
backdrop-filter:blur(18px);
border-radius:24px;
border:1px solid rgba(255,255,255,.08);
}

.option{
background:#1e293b;
padding:14px;
border-radius:12px;
border:1px solid #334155;
cursor:pointer;
transition:.2s;
}

.option:hover{
border-color:#fbbf24;
transform:translateY(-2px);
}

.correct{
background:#065f46;
}

.wrong{
background:#7f1d1d;
}

.memoryStage{
position:relative;
height:200px;
}

.card{
width:110px;
height:140px;
position:absolute;
border-radius:12px;
border:2px solid #fbbf24;
display:flex;
align-items:center;
justify-content:center;
background:#1e293b;
cursor:pointer;
}

</style>

</head>

<body>

<div class="bg"></div>

<div class="flex justify-center mt-16">

<div id="start" class="glass p-10 w-[420px] text-center">

<h1 class="text-3xl font-black mb-6">Bel-Engleezi Test</h1>

<input id="name" placeholder="Full Name"
class="w-full p-3 rounded bg-slate-900 border border-slate-600 mb-4">

<select id="age"
class="w-full p-3 rounded bg-slate-900 border border-slate-600 mb-4">

<option value="">Age Group</option>
<option value="under20">Under 20</option>
<option value="over20">Over 20</option>

</select>

<select id="gender"
class="w-full p-3 rounded bg-slate-900 border border-slate-600 mb-6">

<option value="">Gender</option>
<option value="male">Male</option>
<option value="female">Female</option>

</select>

<button onclick="startTest()"
class="bg-yellow-500 text-black px-8 py-3 rounded font-bold w-full">

Start Test

</button>

</div>

</div>

<div id="quiz"
class="hidden flex justify-center mt-10">

<div class="glass p-8 w-[700px]">

<div id="counter"
class="text-yellow-400 font-bold mb-4"></div>

<div id="question"
class="text-xl font-bold mb-4"></div>

<div id="options"
class="space-y-3"></div>

<div id="explain"
class="text-yellow-400 text-sm mt-3"></div>

<div id="memory"
class="memoryStage mt-6"></div>

<button id="next"
onclick="nextQ()"
class="hidden mt-6 bg-white text-black px-6 py-2 rounded">

Next

</button>

</div>

</div>

<script>

let state={
i:0,
score:0
}

let cheat=0

document.addEventListener("visibilitychange",function(){

if(document.hidden){

cheat++

if(cheat>2){

alert("Test closed because of tab switching")

finish()

}

}

})

const questions=[

{
type:"grammar",
q:"Hardly ___ the meeting when the alarm rang.",
a:["I started","had I started","did I start","I start"],
c:1,
ex:"After hardly we use inversion form. had I started."
},

{
type:"grammar",
q:"Despite ___ a lot of experience he failed.",
a:["have","having","to have","has"],
c:1,
ex:"After despite we use verb+ing."
},

{
type:"scenario",
q:"Client angry about delay. Best response?",
a:[
Ignore message
,
Apologize and explain delay
,
Blame another department
,
Tell client wait
],
c:1
},

{
type:"memory",
target:"Laptop",
cards:[
{w:"Laptop"},
{w:"Phone"},
{w:"Camera"},
{w:"Tablet"}
]
}

]

function startTest(){

let name=document.getElementById("name").value
let age=document.getElementById("age").value
let gender=document.getElementById("gender").value

if(!name||!age||!gender){

alert("Complete the data")

return

}

document.getElementById("start").style.display="none"
document.getElementById("quiz").classList.remove("hidden")

render()

}

function render(){

let q=questions[state.i]

document.getElementById("counter").innerText=
(state.i+1)+" / "+questions.length

document.getElementById("options").innerHTML=""
document.getElementById("explain").innerText=""
document.getElementById("memory").innerHTML=""
document.getElementById("next").classList.add("hidden")

document.getElementById("question").innerText=q.q||"Memory Question"

if(q.type==="memory"){

runMemory(q)

return

}

q.a.forEach((o,i)=>{

let div=document.createElement("div")

div.className="option"

div.innerText=o

div.onclick=()=>answer(i,q)

document.getElementById("options").appendChild(div)

})

}

function answer(i,q){

let opts=document.querySelectorAll(".option")

opts.forEach(x=>x.onclick=null)

if(i===q.c){

opts[i].classList.add("correct")

state.score++

}else{

opts[i].classList.add("wrong")

opts[q.c].classList.add("correct")

}

if(q.ex){

document.getElementById("explain").innerText=q.ex

}

document.getElementById("next").classList.remove("hidden")

}

function runMemory(q){

let stage=document.getElementById("memory")

let pos=[10,35,60,85]

q.cards.forEach((c,i)=>{

let d=document.createElement("div")

d.className="card"

d.style.left="calc("+pos[i]+"% - 55px)"

d.innerText=c.w

d.dataset.word=c.w

stage.appendChild(d)

})

setTimeout(()=>{

document.querySelectorAll(".card").forEach(c=>{

c.innerText="BE"

})

shuffle(q)

},10000)

}

function shuffle(q){

let cards=[...document.querySelectorAll(".card")]

let moves=0

let inter=setInterval(()=>{

moves++

cards.forEach(c=>{

let x=Math.random()*80

c.style.left="calc("+x+"% - 55px)"

})

if(moves>5){

clearInterval(inter)

cards.forEach(c=>{

c.onclick=()=>pick(c,q)

})

}

},600)

}

function pick(card,q){

if(card.dataset.word===q.target){

card.classList.add("correct")

state.score++

}else{

card.classList.add("wrong")

}

document.getElementById("next").classList.remove("hidden")

}

function nextQ(){

state.i++

if(state.i<questions.length){

render()

}else{

finish()

}

}

function finish(){

let name=document.getElementById("name").value
let age=document.getElementById("age").value
let gender=document.getElementById("gender").value

let text=
"Student "+name+
" Age "+age+
" Gender "+gender+
" Score "+state.score

let url=
"https://wa.me/201144576661?text="+
encodeURIComponent(text)

window.open(url)

document.body.innerHTML=
"<h1 style='text-align:center;margin-top:120px'>Test Finished</h1>"

}

</script>

</body>
</html>
